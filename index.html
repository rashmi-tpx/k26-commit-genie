<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceNow Release Quiz | Knowledge26 Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Outfit',sans-serif;background:#181f2a;color:#e8f4f8;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
    .header-img,.footer-img{width:100%;display:block;min-height:60px;background:#181f2a;}
    .quiz-container{background:rgba(24,31,42,0.95);border-radius:12px;padding:32px 20px;max-width:420px;margin:auto;box-shadow:0 2px 12px rgba(0,199,177,0.08);}
    h1{color:#62d84e;font-size:2rem;text-align:center;margin-bottom:18px;}
    .question{font-size:1.1rem;color:#e8f4f8;margin-bottom:16px;font-weight:700;}
    .options{display:flex;flex-direction:column;gap:12px;margin-bottom:18px;}
    .option-btn{background:linear-gradient(135deg,#62d84e,#00c7b1);color:#181f2a;font-weight:700;border:none;border-radius:8px;padding:12px 0;cursor:pointer;transition:transform .1s;}
    .option-btn:hover{transform:translateY(-2px);}
    .feedback{font-size:1rem;color:#7a9bb5;margin-bottom:12px;min-height:24px;}
    .score{font-size:1rem;color:#00c7b1;text-align:center;margin-bottom:12px;}
    .restart-btn{background:#00c7b1;color:#181f2a;font-weight:700;border:none;border-radius:8px;padding:10px 0;width:100%;cursor:pointer;margin-top:16px;}
    @media(max-width:600px){.quiz-container{padding:18px 6px;}}
  </style>
</head>
<body>
  <img src="https://via.placeholder.com/1200x140?text=Header+Image" class="header-img" alt="Header" />
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 10px;">
    <div class="quiz-container">
      <h1>ServiceNow Release Quiz</h1>
      <div class="score" id="score">Score: 0/0</div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <button class="restart-btn" id="restart" style="display:none;">Restart Quiz</button>
    </div>
  </div>
  <img src="https://via.placeholder.com/1200x28?text=Footer+Image" class="footer-img" alt="Footer" />
  <script>
    const quiz=[
      {q:"What is the codename for the ServiceNow Tokyo release?",o:["Tokyo","Quebec","Rome","Paris"],a:0},
      {q:"Which year was the ServiceNow Paris release launched?",o:["2019","2020","2021","2018"],a:1},
      {q:"Which feature was introduced in the ServiceNow Quebec release?",o:["AI Search","Flow Designer","Mobile App","Performance Analytics"],a:0},
      {q:"What is the codename for the ServiceNow release after Rome?",o:["San Diego","Tokyo","Paris","Quebec"],a:0},
      {q:"Which ServiceNow release introduced the App Engine Studio?",o:["Rome","San Diego","Quebec","Paris"],a:2}
    ];
    let idx=0,score=0;
    const qEl=document.getElementById('question'),oEl=document.getElementById('options'),fEl=document.getElementById('feedback'),sEl=document.getElementById('score'),rBtn=document.getElementById('restart');
    function showQ(){
      sEl.textContent=`Score: ${score}/${idx}`;
      fEl.textContent='';
      if(idx<quiz.length){
        qEl.textContent=quiz[idx].q;
        oEl.innerHTML='';
        quiz[idx].o.forEach((opt,i)=>{
          const b=document.createElement('button');
          b.className='option-btn';
          b.textContent=opt;
          b.onclick=()=>checkA(i);
          oEl.appendChild(b);
        });
      }else{
        qEl.textContent='Quiz Complete!';
        oEl.innerHTML='';
        fEl.textContent=`Final Score: ${score}/${quiz.length}`;
        rBtn.style.display='block';
      }
    }
    function checkA(i){
      if(i===quiz[idx].a){
        fEl.textContent='Correct!';
        score++;
      }else{
        fEl.textContent='Incorrect.';
      }
      idx++;
      setTimeout(showQ,900);
    }
    rBtn.onclick=()=>{idx=0;score=0;rBtn.style.display='none';showQ();};
    showQ();
  </script>
</body>
</html>
